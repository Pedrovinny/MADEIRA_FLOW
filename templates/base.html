<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Madeira Flow{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body          { background-color: #f0f2f5; }
        .navbar       { box-shadow: 0 2px 6px rgba(0,0,0,.4); }
        .card         { box-shadow: 0 1px 4px rgba(0,0,0,.08); border: none; border-radius: .5rem; }
        .stat-value   { font-size: 1.9rem; font-weight: 700; line-height: 1.1; }
        .stat-label   { font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; }
        .table-sticky thead th { position: sticky; top: 0; z-index: 1; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-0">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold fs-5">
            <i class="bi bi-water me-1"></i> MADEIRA FLOW
        </span>
        <span class="text-secondary small d-none d-md-inline">
            Sistema de Monitoramento Hidrométrico — ANA
        </span>
    </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
